name: this workflow is for the reactjs test case run through pipeline
on: push
jobs: 
  test-job:
   runs-on: ubuntu-latest
   steps:
    - name: checkout the code
      uses: actions/checkout@v3
    - name: install node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: install dependencies
      run: npm ci
    - name: run test
      run: npm test
  deploy-job:
    needs: ["test-job"]
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v3
      - name: install node jobs
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: install dependencies
        run: npm ci
      - name: deploy
        run: npm run build
      - name: Deployemt status
        run: echo "Deploying...."
